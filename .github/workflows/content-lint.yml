name: Content Lint — Knowledge Base Health Check

on:
  schedule:
    - cron: '0 2 * * 1'  # tiap Senin jam 09.00 WIB
  workflow_dispatch:

jobs:
  content-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install "notion-client==1.0.0" anthropic

      - name: Run content linting
        run: |
          python -c "
          import os, json, anthropic
          from datetime import date
          from notion_client import Client

          notion = Client(auth=os.environ['NOTION_API_KEY'])
          claude = anthropic.Anthropic(api_key=os.environ['ANTHROPIC_API_KEY'])
          DATABASE_ID = os.environ['NOTION_DATABASE_ID']
          QUERY_LOG_DB_ID = os.environ['QUERY_LOG_PAGE_ID']
          LINT_PARENT_ID = os.environ['LINT_REPORT_PAGE_ID']
          today = date.today()

          print('[lint] Fetching all SOPs...')
          all_pages = notion.databases.query(database_id=DATABASE_ID)['results']
          sops = []
          for p in all_pages:
              props = p['properties']
              name = props['Name']['title'][0]['text']['content'] if props['Name']['title'] else ''
              status = props.get('Status', {}).get('status', {}).get('name', '')
              folder = (props.get('Folder', {}).get('rich_text', []) or [{}])[0].get('text', {}).get('content', '')
              tags = [t['name'] for t in props.get('Tags', {}).get('multi_select', [])]
              related = props.get('Related To', {}).get('relation', [])
              sops.append({'id': p['id'], 'name': name, 'status': status, 'folder': folder, 'tags': tags, 'related_count': len(related)})
          print('[lint] Found ' + str(len(sops)) + ' SOPs')

          print('[lint] Fetching unanswered queries...')
          unanswered_queries = []
          try:
              query_results = notion.databases.query(database_id=QUERY_LOG_DB_ID).get('results', [])
              for r in query_results:
                  props = r['properties']
                  answered = props.get('Answered', {}).get('select', {})
                  if answered and answered.get('name') == 'No':
                      title = props.get('Name', {}).get('title', [])
                      q = title[0]['text']['content'] if title else ''
                      if q:
                          unanswered_queries.append(q)
          except Exception as ex:
              print('[lint] Query log error: ' + str(ex))

          orphans = [s['name'] for s in sops if s['related_count'] == 0 and s['status'] not in ['archived', 'obsoleted']]

          sop_list = '\n'.join([
              '- ' + s['name'] + ' [' + s['status'] + '] folder=' + s['folder'] + ' tags=' + ','.join(s['tags'][:3])
              for s in sops if s['status'] not in ['archived', 'obsoleted']
          ])
          unanswered_str = '\n'.join(['- ' + q for q in unanswered_queries]) or 'Tidak ada.'

          prompt = (
              'Kamu adalah quality checker knowledge base Engineering PT Etana.\n\n'
              'Daftar SOP aktif:\n' + sop_list + '\n\n'
              'Query tidak terjawab:\n' + unanswered_str + '\n\n'
              'Tugas:\n'
              '1. Identifikasi kemungkinan kontradiksi antar SOP\n'
              '2. Identifikasi topik belum ada SOP berdasarkan query tidak terjawab\n'
              '3. Identifikasi coverage gap umum untuk engineering farmasi\n\n'
              'Return HANYA JSON tanpa teks lain:\n'
              '{\"contradictions\":[{\"sop_a\":\"...\",\"sop_b\":\"...\",\"reason\":\"...\"}],\"missing_sops\":[{\"topic\":\"...\",\"reason\":\"...\"}],\"coverage_gaps\":[\"...\"]}'
          )

          print('[lint] Sending to Claude...')
          response = claude.messages.create(
              model='claude-sonnet-4-6',
              max_tokens=3000,
              messages=[{'role': 'user', 'content': prompt}]
          )
          raw = response.content[0].text.strip()
          s, e = raw.find('{'), raw.rfind('}') + 1
          analysis = json.loads(raw[s:e]) if s != -1 and e > s else {}

          contradictions = analysis.get('contradictions', [])
          missing = analysis.get('missing_sops', [])
          gaps = analysis.get('coverage_gaps', [])

          contra_str = '\n'.join(['- ' + c['sop_a'] + ' vs ' + c['sop_b'] + ': ' + c['reason'] for c in contradictions]) or 'Tidak ada kontradiksi terdeteksi.'
          missing_str = '\n'.join(['- ' + m['topic'] + ': ' + m['reason'] for m in missing]) or 'Tidak ada.'
          gap_str = '\n'.join(['- ' + g for g in gaps]) or 'Coverage sudah cukup baik.'
          orphan_str = '\n'.join(['- ' + o for o in orphans]) or 'Tidak ada SOP orphan.'
          active_count = str(len([s for s in sops if s['status'] not in ['archived', 'obsoleted']]))

          def make_blocks(text):
              chunks = [text[i:i+1800] for i in range(0, len(text), 1800)]
              return [{'object': 'block', 'type': 'paragraph', 'paragraph': {'rich_text': [{'type': 'text', 'text': {'content': c}}]}} for c in chunks]

          blocks = []
          blocks += make_blocks('Lint report otomatis ' + today.isoformat())
          blocks += make_blocks(
              'RINGKASAN\n'
              'Total SOP aktif: ' + active_count + '\n'
              'SOP orphan: ' + str(len(orphans)) + '\n'
              'Potensi kontradiksi: ' + str(len(contradictions)) + '\n'
              'Topik belum ada SOP: ' + str(len(missing)) + '\n'
              'Query tidak terjawab: ' + str(len(unanswered_queries))
          )
          blocks += make_blocks('POTENSI KONTRADIKSI\n' + contra_str)
          blocks += make_blocks('TOPIK BELUM ADA SOP\n' + missing_str)
          blocks += make_blocks('COVERAGE GAPS\n' + gap_str)
          blocks += make_blocks('SOP ORPHAN (tidak punya relasi)\n' + orphan_str)
          blocks += make_blocks('Laporan otomatis oleh Claude. Validasi Owner sebelum diambil tindakan.')

          title = 'Lint Report - ' + today.strftime('%d %B %Y')
          notion.pages.create(
              parent={'page_id': LINT_PARENT_ID},
              properties={'title': [{'text': {'content': title}}]},
              children=blocks[:100]
          )
          print('[lint] Report created: ' + title)
          print('[lint] Contradictions: ' + str(len(contradictions)))
          print('[lint] Missing SOPs: ' + str(len(missing)))
          print('[lint] Orphans: ' + str(len(orphans)))
          "
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          QUERY_LOG_PAGE_ID: ${{ secrets.QUERY_LOG_PAGE_ID }}
          LINT_REPORT_PAGE_ID: ${{ secrets.LINT_REPORT_PAGE_ID }}