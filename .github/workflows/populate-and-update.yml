name: Populate SOP Database & Process Feedback

on:
  push:
    paths:
      - 'wiki/**'
      - 'raw/**'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest-raw:
    name: Ingest Raw Documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Detect & ingest changed raw docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WIKI_DIR: wiki
          RAW_DIR: raw
        run: python scripts/ingest-raw.py
      - name: Commit new wiki files
        run: |
          git config --global user.name "TechOps Bot"
          git config --global user.email "bot@techops.com"
          git pull --rebase origin main
          git add wiki/ .raw-ingest-state.json
          git diff --staged --quiet || git commit -m "auto: ingest raw docs $(date +'%Y-%m-%d')"
          git push

  process-knowledge-pending:
    name: Process Knowledge Pending Review
    runs-on: ubuntu-latest
    needs: ingest-raw
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Process approved/rejected knowledge from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          WIKI_DIR: wiki
        run: python scripts/process-knowledge-pending.py
      - name: Commit approved knowledge files
        run: |
          git config --global user.name "TechOps Bot"
          git config --global user.email "bot@techops.com"
          git pull --rebase origin main
          git add wiki/
          git diff --staged --quiet || git commit -m "auto: knowledge capture approved $(date +'%Y-%m-%d')"
          git push

  populate-sop-database:
    name: Populate SOP Master Database
    runs-on: ubuntu-latest
    needs: process-knowledge-pending
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Populate SOP Master Database from wiki
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          WIKI_DIR: wiki
        run: python scripts/populate-sop-database.py

  check-stale:
    name: Auto-detect Stale & Obsoleted Pages
    runs-on: ubuntu-latest
    needs: populate-sop-database
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Check and mark stale/obsoleted pages
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          STALE_DAYS: 90
          WIKI_DIR: wiki
        run: python scripts/check-stale.py

  process-approved-feedback:
    name: Process Approved Feedback
    runs-on: ubuntu-latest
    needs: check-stale
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Update wiki from approved feedback
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_FEEDBACK_DB_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WIKI_DIR: wiki
        run: python scripts/update-wiki-from-feedback.py
      - name: Commit updated wiki files
        run: |
          git config --global user.name "TechOps Bot"
          git config --global user.email "bot@techops.com"
          git pull --rebase origin main
          git add wiki/
          git diff --staged --quiet || git commit -m "auto: update wiki from approved feedback $(date +'%Y-%m-%d')"
          git push
